<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kairov - AI Workflow Automation</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .container { text-align: center; max-width: 800px; padding: 2rem; }
    h1 {
      font-size: 3.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 1rem;
    }
    .tagline {
      font-size: 1.25rem;
      color: #888;
      margin-bottom: 2rem;
    }
    .status {
      display: inline-block;
      padding: 0.5rem 1.5rem;
      border: 1px solid #333;
      border-radius: 999px;
      font-size: 0.875rem;
      color: #667eea;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Kairov</h1>
    <p class="tagline">AI-powered workflow automation that eliminates manual work</p>
    <span class="status">Platform Under Construction</span>
  </div>
</body>
</html>
